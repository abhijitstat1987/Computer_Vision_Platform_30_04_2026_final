server {
    listen 80;
    server_name _;

    # Serve React SPA static files
    root  /usr/share/nginx/html;
    index index.html;

    # React Router — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Flask backend ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout — training status polls + export downloads
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;

        # Required for Server-Sent Events (training log streaming)
        proxy_buffering       off;
        proxy_cache           off;
        proxy_set_header      Connection "";
    }

    # ── Uploaded images / snapshots served by Flask ───────────────────────────
    location /uploads/ {
        proxy_pass            http://backend:5000;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_read_timeout    60s;

        # Allow large image uploads (64 MB)
        client_max_body_size  64m;
    }

    # Allow large file uploads through nginx for /api/ routes too
    client_max_body_size 64m;
}
